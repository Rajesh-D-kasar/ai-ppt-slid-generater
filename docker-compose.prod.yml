services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:8080
      - AI_FALLBACK_ON_ERROR=${AI_FALLBACK_ON_ERROR:-true}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend