services:
  - type: web
    name: ai-ppt-slide-generator-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AI_FALLBACK_ON_ERROR
        value: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.example

  - type: web
    name: ai-ppt-slide-generator-web
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://your-backend-domain.example